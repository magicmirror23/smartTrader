# Render config
services:
  - type: web
    name: stocktrader
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: POSTGRES_USER
        value: stocktrader
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: stocktrader
      - key: DATABASE_URL
        fromDatabase:
          name: stocktrader-db
          property: connectionString
      - key: REDIS_URL
        value: ""
    healthCheckPath: /api/v1/health

databases:
  - name: stocktrader-db
    plan: free
    databaseName: stocktrader
    user: stocktrader
